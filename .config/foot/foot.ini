[main]
font=monospace:size=12

pad=8x8

[colors-dark]
# Background / foreground
background=1E1E2E
foreground=DCD7BA

# Normal (ANSI 0-7)
regular0=090618   # black
regular1=C34043   # red
regular2=76946A   # green
regular3=C0A36E   # yellow
regular4=7E9CD8   # blue
regular5=957FB8   # magenta / violet
regular6=6A9589   # cyan / teal
regular7=C8C093   # white / warm gray

# Bright (ANSI 8-15)
bright0=727169    # bright black / comment gray
bright1=E82424    # bright red
bright2=98BB6C    # bright green
bright3=E6C384    # bright yellow / gold
bright4=7FB4CA    # bright blue / sky
bright5=D27E99    # bright magenta / sakura pink
bright6=7AA89F    # bright cyan / wave teal
bright7=DCD7BA    # bright white / fg

# Cursor
# cursor=C8C093
# cursor-text=1F1F28

# Selection
selection-background=363646
selection-foreground=DCD7BA

# URLs (highlighted on hover)
urls=7FB4CA

